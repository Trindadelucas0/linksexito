<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modal de Links Premium</title>
  <meta name="description" content="Página de links premium minimalista, responsiva e mobile-first.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --brand-green: #00DC00;
      --line: #8c7b6b;
      --text: #000000;
      --text-soft: #000000;
      --shadow: 0 14px 30px rgba(74, 63, 53, 0.15);
      --radius-phone: 2.4rem;
      --radius-cover: 1.8rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      justify-items: center;
      align-content: start;
      padding: 0.7rem 0.55rem;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Serif", Georgia, "Times New Roman", serif;
    }

    .phone {
      width: min(100%, 25rem);
      background: var(--surface);
      border-radius: var(--radius-phone);
      border: none;
      box-shadow: none;
      padding: 0.6rem 0.65rem 1rem;
      animation: fadeInUp 700ms ease both;
    }

    .profile {
      width: 7.8rem;
      height: 7.8rem;
      margin: 0.55rem auto 0.65rem;
      border-radius: 50%;
      object-fit: cover;
      border: none;
      box-shadow: none;
      display: block;
      position: relative;
      z-index: 2;
    }

    .profile-name {
      margin: 0 0 0.2rem;
      font-family: "DM Serif Display", "Times New Roman", serif;
      font-size: 1.58rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.16;
      letter-spacing: 0.005em;
      color: var(--brand-green);
    }

    .profile-role {
      margin: 0 0 1.2rem;
      text-align: center;
      color: rgba(0, 0, 0, 0.72);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      line-height: 1.2;
      font-weight: 500;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 1.05rem;
    }

    .social-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
      transition: transform 220ms ease, color 220ms ease, opacity 220ms ease;
      opacity: 0.9;
    }

    .social-link:hover,
    .social-link:focus-visible {
      transform: translateY(-1px);
      color: var(--line);
      opacity: 1;
      outline: none;
    }

    .links {
      display: grid;
      gap: 0.58rem;
      padding: 0 0.05rem 0.2rem;
    }

    .link-btn {
      display: grid;
      grid-template-columns: 1.4rem 1fr 1.4rem;
      align-items: center;
      min-height: 2.35rem;
      border: 1px solid var(--brand-green);
      border-radius: 0.85rem;
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      font-size: 0.69rem;
      letter-spacing: 0.08em;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0 0.85rem;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      transition: background-color 260ms ease, color 260ms ease, transform 220ms ease, box-shadow 260ms ease;
      opacity: 0;
      animation: fadeInButton 700ms ease forwards;
    }

    .link-btn-icon {
      grid-column: 1;
      justify-self: center;
      font-size: 0.92rem;
      color: #111111;
    }

    .link-btn-text {
      grid-column: 2;
      text-align: center;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      background: rgba(18, 196, 79, 0.08);
      color: #000000;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
      outline: none;
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .closing-message {
      margin-top: 2rem;
      text-align: center;
      color: rgba(0, 0, 0, 0.78);
      line-height: 1.45;
    }

    .closing-message p {
      margin: 0;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .closing-signature {
      display: inline-block;
      margin-top: 1.4rem;
    }

    @media (max-width: 739px) {
      .phone {
        width: min(100%, 27rem);
        min-height: calc(100dvh - 1.4rem);
        padding: 0.8rem 0.8rem 1.35rem;
      }

      .profile-name {
        font-size: 1.72rem;
      }

      .profile-role {
        font-size: 0.78rem;
        letter-spacing: 0.1em;
      }

      .social-link {
        font-size: 1.12rem;
      }

      .links {
        gap: 0.7rem;
      }

      .link-btn {
        min-height: 2.78rem;
        font-size: 0.82rem;
        letter-spacing: 0.15em;
      }

      .closing-message p {
        font-size: 0.84rem;
      }
    }

    @media (min-width: 740px) {
      body {
        min-height: 100vh;
        place-items: center;
        padding: 1.8rem;
      }

      .phone {
        width: min(100%, 30rem);
        padding-bottom: 1.35rem;
      }

      .profile-name {
        font-size: 1.9rem;
      }

      .profile-role {
        font-size: 0.76rem;
        letter-spacing: 0.11em;
      }

      .link-btn {
        min-height: 2.72rem;
        font-size: 0.75rem;
        letter-spacing: 0.22em;
      }

      .closing-message p {
        font-size: 0.8rem;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInButton {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Cartão de links">
    <!-- Substitua a foto de perfil alterando apenas o src -->
    <img
      class="profile"
      src="img/LOGO EXITO ALTA QUALIDADE.png"
      alt="Foto de perfil de Exito Contabilidade"
    >

    <!-- Nome e subtítulo editáveis -->
    <h1 class="profile-name">Exito Contabilidade</h1>
    <p class="profile-role">@exitoconunai</p>

    <nav class="socials" aria-label="Redes sociais">
      <a class="social-link" href="https://wa.me/38998788927" aria-label="WhatsApp" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
      </a>
      <a class="social-link" href="https://instagram.com/exitoconunai" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-instagram" aria-hidden="true"></i>
      </a>
    </nav>

    <section id="linksContainer" class="links" aria-label="Links principais"></section>

    <footer class="closing-message" aria-label="Mensagem final">
      <p>Mais do que números, entendemos os desafios do seu dia a dia e crescemos junto com o seu negócio.<br><span class="closing-signature">© Êxito Contabilidade &amp; Consultoria</span></p>
    </footer>
  </main>

  <script>
    const links = [
      { title: "site", url: "https://www.exitocon.com.br/", icon: "fa-solid fa-globe" },
      { title: "Quero ser cliente Exito", url: "https://wa.me/38998788927", icon: "fa-brands fa-whatsapp" },
      { title: "Serviços", url: "#", icon: "fa-solid fa-briefcase" },
      { title: "Cursos e treinamentos", url: "#", icon: "fa-solid fa-graduation-cap" },
      { title: "Café com negocios", url: "#", icon: "fa-solid fa-mug-hot" }
    ];

    const linksContainer = document.getElementById("linksContainer");

    links.forEach(({ title, url, icon }, index) => {
      const anchor = document.createElement("a");
      anchor.className = "link-btn";
      anchor.href = url;
      anchor.setAttribute("aria-label", `Abrir ${title}`);
      anchor.style.animationDelay = `${index * 140}ms`;

      const iconEl = document.createElement("i");
      iconEl.className = `link-btn-icon ${icon || "fa-solid fa-link"}`;
      iconEl.setAttribute("aria-hidden", "true");

      const textEl = document.createElement("span");
      textEl.className = "link-btn-text";
      textEl.textContent = title;

      const spacerEl = document.createElement("span");
      spacerEl.setAttribute("aria-hidden", "true");

      anchor.appendChild(iconEl);
      anchor.appendChild(textEl);
      anchor.appendChild(spacerEl);

      if (!url || url === "#") {
        anchor.target = "_self";
      } else {
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";
      }

      linksContainer.appendChild(anchor);
    });
  </script>
</body>
</html>
